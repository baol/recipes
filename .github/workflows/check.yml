name: check
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Check markdown formatting with mdformat
        run: mdformat --check **/*.md
